version: "3.8"

services:
  source-db:
    image: postgres:15
    environment:
      POSTGRES_USER: source
      POSTGRES_PASSWORD: source
      POSTGRES_DB: sourcedb
    ports:
      - "5433:5432"
    volumes:
      - ./seed:/docker-entrypoint-initdb.d

  target-db:
    image: postgres:15
    environment:
      POSTGRES_USER: target
      POSTGRES_PASSWORD: target
      POSTGRES_DB: targetdb
    ports:
      - "5434:5432"
