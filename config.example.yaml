app:
  name: agentic-migration-orchestrator

engine:
  type: copy                 # copy | spark_jdbc
  auto_ddl: true
  allow_destructive: true     # required if truncate_first=true
  verify_inline: false        # you can keep external verifier instead
  copy:
    truncate_first: true
    spool_dir: null           # or "./.spool"
    batchsize: 10000

source:
  host: ${SRC_HOST}
  port: ${SRC_PORT}
  database: ${SRC_DB}
  user: ${SRC_USER}
  password: ${SRC_PASSWORD}

target:
  host: ${DST_HOST}
  port: ${DST_PORT}
  database: ${DST_DB}
  user: ${DST_USER}
  password: ${DST_PASSWORD}

migration:
  include_schemas: []     # empty means “all non-system schemas”
  exclude_schemas:
    - pg_catalog
    - information_schema

exclude_schemas:
  - pg_catalog
  - information_schema

exclude_tables:
  - spatial_ref_sys
  - geometry_columns
  - geography_columns

exclude_suffixes: []     # optional; project-specific

planning:
  planner: heuristic        # heuristic | demo | gemini | openai | ollama
  max_partitions: 16
  default_batch_size: 20000

post_migration:
  maintenance: auto         # auto | analyze_only | vacuum_analyze | off

verify:
  sample_hash: false
  sample_rows: 200
  checks:
    rowcount: true
    sample_hash: false
    indexes: false
    primary_keys: false
    matviews: false
    geometry: false
